services:
  drone:
    image: novaros/drone-control:humble
    container_name: drone-control
    privileged: true
    network_mode: host
    volumes:
      - /dev:/dev
      - ./src:/ros2_ws/src:ro
    environment:
      - ROS_DOMAIN_ID=0
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
      ros2 run mavros mavros_node --ros-args -p fcu_url:=serial:///dev/ttyACM0:115200 -p system_id:=255 &
      sleep 5 &&
      python3 /ros2_ws/src/drone_control/drone_control/api_gateway.py"
    restart: unless-stopped

  web:
    image: python:3.11-slim
    container_name: web-control
    network_mode: host
    volumes:
      - ../web:/app:ro
    working_dir: /app
    command: >
      bash -c "pip install --no-cache-dir flask requests -q &&
      python3 app.py"
    restart: unless-stopped
    depends_on:
      - drone
