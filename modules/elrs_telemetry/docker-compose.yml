# Standalone compose for the ELRS telemetry bridge.
# Lives in modules/elrs_telemetry/ — completely separate from
# ros2/docker-compose.yml so it can be brought up/down without
# touching the existing drone, vision, or web containers.
#
# Run from this directory:
#   docker compose build
#   docker compose up -d
#   docker compose logs -f

services:
  elrs:
    build: .
    image: novaros/elrs-telemetry:latest
    container_name: elrs-telemetry
    # network_mode: host so port 5003 is reachable on the Pi's LAN/Tailscale IP
    # without any port-mapping overhead. Matches the pattern used by the other
    # NovaROS containers.
    network_mode: host
    # privileged + /dev mount mirrors the drone-control container's pattern.
    # Lets the service see the ESP32 by its stable by-id symlink and survive
    # USB hot-plug (the by-id link gets re-created by udev on replug).
    privileged: true
    volumes:
      - /dev:/dev
    environment:
      # Stable by-id path — will not be stolen by the CubeOrange when it's
      # plugged back in (different USB serial).
      - ELRS_SERIAL_DEVICE=/dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_FC:01:2C:E8:BC:64-if00
      - ELRS_PORT=5003
      # Token-bucket rate limit for telemetry POSTs. Raised to 200 Hz to allow
      # an internal stub producer to feed the new downlink Tx at packet rate
      # (~100 Hz) so the bound Rx stays in "linked" state visible-bind during
      # H4-prep. External producers (operator app etc.) should rate-limit
      # themselves via this same env if needed.
      - ELRS_TX_RATE_HZ=200
      # Set ELRS_API_TOKEN=... to require Authorization: Bearer on POSTs.
      # Empty (default) leaves POSTs open — fine on a private LAN.
    restart: unless-stopped

  elrs-producers:
    # Sidecar that runs the 5 telemetry producers (RC keeper + 4 FC-sourced)
    # under an inner supervisor. Replaces the nohup-from-shell pattern that
    # didn't survive Pi reboots. Inner supervisor restarts individual
    # producers on crash; Docker `restart: unless-stopped` handles full
    # container failures.
    build:
      context: .
      dockerfile: producers.Dockerfile
    image: novaros/elrs-producers:latest
    container_name: elrs-producers
    # host networking so the producers can reach the daemon on localhost:5003
    # and drone-control on localhost:8080 without bridging gymnastics.
    network_mode: host
    depends_on:
      - elrs
    environment:
      # Reads FC telemetry from drone-control HTTP. Override if drone-control
      # ever moves off localhost.
      - DRONE_CONTROL_URL=http://localhost:8080
      # RC keeper rate. 10 Hz is sufficient to maintain ELRS Tx bind and
      # leaves OTA budget for telemetry frames. The supervisor passes this
      # through only to the RC keeper child.
      - ELRS_PRODUCER_HZ=10
    restart: unless-stopped
